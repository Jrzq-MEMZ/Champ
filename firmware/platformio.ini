; PlatformIO 备用配置（Arduino IDE 用不到，但便于 IDE 识别）
; Arduino IDE 烧录方式见 docs/FIRMWARE.md
[platformio]
src_dir = .

[env:esp32cam]
platform = espressif32@6.7.0
board = esp32cam
framework = arduino
monitor_speed = 115200
board_build.ledc_channel = 0
build_flags =
  -DBOARD_HAS_PSRAM
lib_deps =
  esp32cam
  PubSubClient
  DHT sensor library
  ArduinoJson

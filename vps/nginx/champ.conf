# Nginx 配置 - Champ 系统反代
# 将文件放到 /etc/nginx/sites-available/champ
# ln -s /etc/nginx/sites-available/champ /etc/nginx/sites-enabled/champ
# 替换 DOMAIN 为你的实际域名

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS 跳转 + ACME challenge
server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主站：REST API + MQTT WebSocket
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name DOMAIN;

    ssl_certificate /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # 日志
    access_log /var/log/nginx/champ-access.log;
    error_log  /var/log/nginx/champ-error.log;

    # REST API -> Node.js (localhost:3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # MQTT over WebSocket -> Mosquitto (localhost:9400)
    # App 通过 wss://DOMAIN/mqtt 连接
    location /mqtt {
        proxy_pass http://127.0.0.1:9400/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 最新快照（Node.js 缓存最新帧，直接 HTTP 返回 JPEG）
    location /api/snapshot/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

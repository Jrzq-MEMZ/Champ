# Mosquitto 配置
# 监听 8883：ESP32 用 TLS + 用户名密码 直连
# 监听 127.0.0.1:1883：本机 Node.js 后端用，无 TLS（内部）
# 监听 127.0.0.1:9400：WebSocket，Nginx 在 443/mqtt 反代到此（给 Flutter App）

# 内部明文（仅本机 Node.js 后端订阅用）
listener 1883 127.0.0.1
allow_anonymous false
password_file /etc/mosquitto/passwd

# 对外 TLS（ESP32 连接）
listener 8883
allow_anonymous false
password_file /etc/mosquitto/passwd
certfile /etc/letsencrypt/live/DOMAIN/fullchain.pem
keyfile /etc/letsencrypt/live/DOMAIN/privkey.pem
tls_version tlsv1.2

# WebSocket（Flutter App 经 Nginx 反代到此）
listener 9400 127.0.0.1
protocol websockets
allow_anonymous false
password_file /etc/mosquitto/passwd

# 持久化
persistence true
persistence_location /var/lib/mosquitto/

# 日志
log_dest file /var/log/mosquitto/mosquitto.log
log_type error
log_type warning
log_type notice
log_timestamp true

# 允许大消息（视频帧最大 ~50KB，留余量）
message_size_limit 100000
max_queued_messages 100
max_inflight_messages 0
